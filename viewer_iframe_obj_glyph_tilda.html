<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ Glyph Dither Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      font-family: Inter, Arial, sans-serif;
    }
    #mount {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
    }
    #webgl,
    #display {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #overlay {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 4;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: min(92vw, 760px);
      pointer-events: none;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 12, 18, 0.72);
      color: #d1d5db;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1;
    }
    .hidden {
      display: none !important;
    }
    #errorBox {
      position: fixed;
      inset: auto 16px 16px 16px;
      z-index: 5;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(26, 10, 12, 0.92);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.25);
      font-size: 13px;
      line-height: 1.45;
      max-width: min(900px, calc(100vw - 32px));
      backdrop-filter: blur(10px);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="mount">
    <canvas id="webgl"></canvas>
    <canvas id="display"></canvas>
  </div>

  <div id="overlay">
    <div id="statusPill" class="pill">Загрузка…</div>
    <div id="metaPill" class="pill">OBJ Glyph Dither</div>
  </div>

  <div id="errorBox" class="hidden"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

    const mount = document.getElementById('mount');
    const webglCanvas = document.getElementById('webgl');
    const displayCanvas = document.getElementById('display');
    const displayCtx = displayCanvas.getContext('2d', { willReadFrequently: true });
    const statusPill = document.getElementById('statusPill');
    const metaPill = document.getElementById('metaPill');
    const errorBox = document.getElementById('errorBox');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
      statusPill.textContent = 'Ошибка';
    }

    function setStatus(message) {
      statusPill.textContent = message;
    }

    const params = new URLSearchParams(window.location.search);
    const config = {
      obj: params.get('obj') || './model.obj',
      cell: clampNumber(params.get('cell'), 4, 40, 11),
      contrast: clampNumber(params.get('contrast'), 0.2, 3, 1.2),
      trail: clampNumber(params.get('trail'), 0, 2, 0.55),
      decay: clampNumber(params.get('decay'), 0.75, 0.995, 0.92),
      charset: params.get('charset') || ' .,:;i1tfLCG08@',
      autoRotate: parseBool(params.get('autoRotate'), true),
      mouseTrail: parseBool(params.get('mouseTrail'), true),
      transparent: parseBool(params.get('transparent'), false),
      bg: params.get('bg') || '#05070a',
      color: params.get('color') || '#ffffff',
      hud: parseBool(params.get('hud'), true),
      speed: clampNumber(params.get('speed'), 0, 0.05, 0.004)
    };

    if (!config.hud) {
      document.getElementById('overlay').classList.add('hidden');
    }

    metaPill.textContent = `${config.cell}px glyph · trail ${config.trail.toFixed(2)}`;

    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }

    function parseBool(value, fallback) {
      if (value == null) return fallback;
      return value === '1' || value === 'true' || value === 'yes';
    }

    function resolveUrl(path) {
      try {
        return new URL(path, window.location.href).toString();
      } catch {
        return path;
      }
    }

    function collapseObjectToMesh(root) {
      const group = new THREE.Group();
      root.traverse((child) => {
        if (child.isMesh && child.geometry) {
          const geometry = child.geometry.clone();
          geometry.computeVertexNormals();
          const material = new THREE.MeshNormalMaterial();
          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.copy(child.position);
          mesh.rotation.copy(child.rotation);
          mesh.scale.copy(child.scale);
          group.add(mesh);
        }
      });
      return group;
    }

    function normalizeObject(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      root.position.sub(center);
      const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
      const scale = 2.4 / maxDim;
      root.scale.setScalar(scale);
      root.rotation.x = -0.25;
      root.rotation.y = 0.45;
      return root;
    }

    async function loadObjText(url) {
      const response = await fetch(resolveUrl(url), { mode: 'cors' });
      if (!response.ok) {
        throw new Error(`Не удалось загрузить OBJ: ${response.status} ${response.statusText}`);
      }
      return await response.text();
    }

    async function main() {
      if (!displayCtx) {
        throw new Error('2D canvas не создался.');
      }

      setStatus('Загружаю OBJ…');
      const objText = await loadObjText(config.obj);

      setStatus('Собираю сцену…');
      const loader = new OBJLoader();
      const parsed = loader.parse(objText);
      const meshGroup = collapseObjectToMesh(parsed);
      if (!meshGroup.children.length) {
        throw new Error('OBJ загружен, но в нём не найдено mesh-геометрии.');
      }
      const model = normalizeObject(meshGroup);

      const renderer = new THREE.WebGLRenderer({
        canvas: webglCanvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 6);
      scene.add(new THREE.AmbientLight(0xffffff, 0.55));
      const light = new THREE.DirectionalLight(0xffffff, 1.25);
      light.position.set(3, 4, 5);
      scene.add(light);
      scene.add(model);

      const trailCanvas = document.createElement('canvas');
      const trailCtx = trailCanvas.getContext('2d', { willReadFrequently: true });
      const bufferCanvas = document.createElement('canvas');
      const bufferCtx = bufferCanvas.getContext('2d', { willReadFrequently: true });
      if (!trailCtx || !bufferCtx) {
        throw new Error('Вспомогательные canvas не создались.');
      }

      const mouse = new THREE.Vector2(0.5, 0.5);
      const targetRot = new THREE.Vector2(0.45, -0.25);
      let width = 1;
      let height = 1;
      let lastPoint = { x: 0, y: 0 };
      let raf = 0;

      function resize() {
        const rect = mount.getBoundingClientRect();
        width = Math.max(320, Math.floor(rect.width));
        height = Math.max(320, Math.floor(rect.height));
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        webglCanvas.width = width;
        webglCanvas.height = height;
        displayCanvas.width = width;
        displayCanvas.height = height;
        trailCanvas.width = width;
        trailCanvas.height = height;
        bufferCanvas.width = width;
        bufferCanvas.height = height;
      }

      function paintTrail() {
        trailCtx.globalCompositeOperation = 'source-over';
        trailCtx.fillStyle = `rgba(0,0,0,${1 - config.decay})`;
        trailCtx.fillRect(0, 0, width, height);
        if (!config.mouseTrail) return;
        const x = mouse.x * width;
        const y = (1 - mouse.y) * height;
        const grad = trailCtx.createRadialGradient(x, y, 0, x, y, Math.max(40, width * 0.12 * config.trail + 20));
        grad.addColorStop(0, `rgba(255,255,255,${0.28 + config.trail * 0.45})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        trailCtx.fillStyle = grad;
        trailCtx.beginPath();
        trailCtx.arc(x, y, Math.max(30, width * 0.08 * config.trail + 18), 0, Math.PI * 2);
        trailCtx.fill();
        trailCtx.strokeStyle = `rgba(255,255,255,${0.12 + config.trail * 0.3})`;
        trailCtx.lineWidth = Math.max(8, width * 0.02 * config.trail + 4);
        trailCtx.lineCap = 'round';
        trailCtx.beginPath();
        trailCtx.moveTo(lastPoint.x || x, lastPoint.y || y);
        trailCtx.lineTo(x, y);
        trailCtx.stroke();
        lastPoint = { x, y };
      }

      function drawAscii() {
        bufferCtx.clearRect(0, 0, width, height);
        bufferCtx.drawImage(webglCanvas, 0, 0, width, height);
        const baseData = bufferCtx.getImageData(0, 0, width, height).data;
        const trailData = trailCtx.getImageData(0, 0, width, height).data;

        displayCtx.clearRect(0, 0, width, height);
        if (!config.transparent) {
          displayCtx.fillStyle = config.bg;
          displayCtx.fillRect(0, 0, width, height);
        }

        const cell = Math.max(4, config.cell);
        const chars = config.charset || ' .:-=+*#%@';
        const cols = Math.ceil(width / cell);
        const rows = Math.ceil(height / cell);
        displayCtx.font = `${Math.floor(cell * 1.02)}px monospace`;
        displayCtx.textBaseline = 'top';
        displayCtx.fillStyle = config.color;

        for (let gy = 0; gy < rows; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const px = Math.min(width - 1, Math.floor(gx * cell + cell * 0.5));
            const py = Math.min(height - 1, Math.floor(gy * cell + cell * 0.5));
            const idx = (py * width + px) * 4;
            const r = baseData[idx];
            const g = baseData[idx + 1];
            const b = baseData[idx + 2];
            const a = baseData[idx + 3] / 255;
            const tr = trailData[idx] / 255;
            let brightness = ((0.2126 * r + 0.7152 * g + 0.0722 * b) / 255) * a;
            brightness = Math.min(1, Math.max(0, (brightness - 0.5) * config.contrast + 0.5 + tr * config.trail));
            const charIndex = Math.min(chars.length - 1, Math.floor(brightness * (chars.length - 1)));
            const char = chars[charIndex];
            if (char !== ' ') {
              displayCtx.fillText(char, gx * cell, gy * cell);
            }
          }
        }
      }

      function onMove(event) {
        const rect = displayCanvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        mouse.set(Math.min(1, Math.max(0, x)), Math.min(1, Math.max(0, y)));
        targetRot.x = (mouse.x - 0.5) * 1.6 + 0.45;
        targetRot.y = (0.5 - mouse.y) * 0.9 - 0.25;
      }

      function onLeave() {
        mouse.set(0.5, 0.5);
        targetRot.x = 0.45;
        targetRot.y = -0.25;
      }

      function tick() {
        if (config.autoRotate) model.rotation.y += config.speed;
        model.rotation.y += (targetRot.x - model.rotation.y) * 0.04;
        model.rotation.x += (targetRot.y - model.rotation.x) * 0.04;
        renderer.setClearColor(0x000000, config.transparent ? 0 : 1);
        renderer.render(scene, camera);
        paintTrail();
        drawAscii();
        raf = requestAnimationFrame(tick);
      }

      resize();
      displayCanvas.addEventListener('pointermove', onMove);
      displayCanvas.addEventListener('pointerleave', onLeave);
      window.addEventListener('resize', resize);
      tick();
      setStatus('Готово');

      window.addEventListener('beforeunload', () => {
        cancelAnimationFrame(raf);
        renderer.dispose();
      });
    }

    main().catch((error) => {
      console.error(error);
      showError(error instanceof Error ? error.message : String(error));
    });
  </script>
</body>
</html>
