<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ Glyph Dither Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, sans-serif;
    }

    #mount {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
      touch-action: none;
      cursor: auto;
    }

    #mount.dragging {
      cursor: auto;
    }

    #webgl,
    #display {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #webgl {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #overlay {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 4;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: min(92vw, 1200px);
      pointer-events: none;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 12, 18, 0.72);
      color: #d1d5db;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1;
    }

    .hidden {
      display: none !important;
    }

    #errorBox {
      position: fixed;
      inset: auto 16px 16px 16px;
      z-index: 5;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(26, 10, 12, 0.92);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.25);
      font-size: 13px;
      line-height: 1.45;
      max-width: min(900px, calc(100vw - 32px));
      backdrop-filter: blur(10px);
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="mount">
    <canvas id="webgl"></canvas>
    <canvas id="display"></canvas>
  </div>

  <div id="overlay">
    <div id="statusPill" class="pill">Загрузка…</div>
    <div id="metaPill" class="pill">OBJ Glyph Dither</div>
  </div>

  <div id="errorBox" class="hidden"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

    const mount = document.getElementById('mount');
    const webglCanvas = document.getElementById('webgl');
    const displayCanvas = document.getElementById('display');
    const displayCtx = displayCanvas.getContext('2d', { willReadFrequently: true });
    const statusPill = document.getElementById('statusPill');
    const metaPill = document.getElementById('metaPill');
    const errorBox = document.getElementById('errorBox');

    // ── Retina / HiDPI fix ──────────────────────────────────────────────────
    // dpr is the physical-to-CSS pixel ratio (2 on most Macs, 1 on Windows).
    // We keep CSS dimensions (width/height) for layout and the glyph grid,
    // and use physW/physH only when touching the raw WebGL pixel buffer.
    const dpr = Math.min(window.devicePixelRatio || 1, 3);

    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }

    function parseBool(value, fallback) {
      if (value == null) return fallback;
      return value === '1' || value === 'true' || value === 'yes';
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
      statusPill.textContent = 'Ошибка';
    }

    function setStatus(message) {
      statusPill.textContent = message;
    }

    function resolveUrl(path) {
      try {
        return new URL(path, window.location.href).toString();
      } catch {
        return path;
      }
    }

    function hexToRgb(hex) {
      const clean = (hex || '#ffffff').replace('#', '');
      const full = clean.length === 3
        ? clean.split('').map((c) => c + c).join('')
        : clean.padEnd(6, 'f').slice(0, 6);
      return {
        r: parseInt(full.slice(0, 2), 16),
        g: parseInt(full.slice(2, 4), 16),
        b: parseInt(full.slice(4, 6), 16)
      };
    }

    function colorWithAlpha(hex, alpha) {
      const { r, g, b } = hexToRgb(hex);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function rgbaString(r, g, b, a) {
      return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a})`;
    }

    function applySaturation(r, g, b, saturation) {
      const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      return {
        r: luma + (r - luma) * saturation,
        g: luma + (g - luma) * saturation,
        b: luma + (b - luma) * saturation
      };
    }

    const params = new URLSearchParams(window.location.search);

    const config = {
      obj: params.get('obj') || './model.obj',

      cell: clampNumber(params.get('cell'), 4, 40, 12),
      contrast: clampNumber(params.get('contrast'), 0.2, 3, 1.8),
      charset: params.get('charset') || ' .,:;i1tfLCG08@',
      color: params.get('color') || '#ffffff',
      bg: params.get('bg') || '#05070a',
      transparent: parseBool(params.get('transparent'), false),
      hud: parseBool(params.get('hud'), true),

      force: clampNumber(params.get('force'), 0, 5, 0.75),
      radius: clampNumber(params.get('radius'), 20, 500, 140),
      returnStrength: clampNumber(params.get('return'), 0.01, 0.5, 0.18),
      swirl: clampNumber(params.get('swirl'), 0, 3, 0.03),

      mouseTrail: parseBool(params.get('mouseTrail'), true),
      cursorGlow: parseBool(params.get('cursorGlow'), false),
      trail: clampNumber(params.get('trail'), 0, 2, 0.04),
      decay: clampNumber(params.get('decay'), 0.75, 0.995, 0.92),

      autoRotate: parseBool(params.get('autoRotate'), false),
      rotateSpeed: clampNumber(params.get('rotateSpeed'), -0.05, 0.05, 0.004),
      mouseRotate: parseBool(params.get('mouseRotate'), true),
      rotateInfluenceX: clampNumber(params.get('rotateInfluenceX'), -4, 4, 1.1),
      rotateInfluenceY: clampNumber(params.get('rotateInfluenceY'), -4, 4, 0.65),

      dragPan: parseBool(params.get('dragPan'), false),
      panStrength: clampNumber(params.get('panStrength'), 0.1, 5, 1.0),

      modelX: clampNumber(params.get('modelX'), -5, 5, 0),
      modelY: clampNumber(params.get('modelY'), -5, 5, 0),
      modelZ: clampNumber(params.get('modelZ'), -5, 5, 0),
      baseRotX: clampNumber(params.get('baseRotX'), -6.28, 6.28, -0.25),
      baseRotY: clampNumber(params.get('baseRotY'), -6.28, 6.28, 0.45),

      lightRotation: clampNumber(params.get('lightRotation'), -6.28, 6.28, 0.70),
      lightHeight: clampNumber(params.get('lightHeight'), -10, 10, 4.0),
      lightDistance: clampNumber(params.get('lightDistance'), 0.2, 20, 5.0),
      lightIntensity: clampNumber(params.get('lightIntensity'), 0, 10, 2.2),
      ambientIntensity: clampNumber(params.get('ambientIntensity'), 0, 2, 0.12),

      shadowPower: clampNumber(params.get('shadowPower'), 0.2, 4, 1.8),
      blackThreshold: clampNumber(params.get('blackThreshold'), 0, 1, 0.12),

      materialMode: params.get('materialMode') || 'matcap',
      matcapPreset: params.get('matcapPreset') || 'iridescent',
      matcapSource: params.get('matcapSource') || 'preset',
      matcapUrl: params.get('matcapUrl') || '',
      colorizeGlyphs: parseBool(params.get('colorizeGlyphs'), true),
      colorStrength: clampNumber(params.get('colorStrength'), 0, 2, 1.0),
      saturation: clampNumber(params.get('saturation'), 0, 2, 1.0)
    };

    if (!config.hud) {
      document.getElementById('overlay').classList.add('hidden');
    }

    metaPill.textContent =
      `${config.cell}px glyph · ${config.materialMode} · ${config.colorizeGlyphs ? 'color' : 'mono'}`;

    function makeMatcapTexture(preset) {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      if (!ctx) return null;

      let stops;
      switch (preset) {
        case 'silver':
          stops = [
            [0.00, '#ffffff'],
            [0.18, '#d9dce2'],
            [0.38, '#8e939d'],
            [0.62, '#f2f4f7'],
            [0.82, '#767d87'],
            [1.00, '#14171c']
          ];
          break;
        case 'chrome':
          stops = [
            [0.00, '#ffffff'],
            [0.12, '#e7ecf8'],
            [0.26, '#6f7c96'],
            [0.46, '#fefefe'],
            [0.68, '#495872'],
            [0.84, '#ced6e5'],
            [1.00, '#090b10']
          ];
          break;
        case 'clay':
          stops = [
            [0.00, '#fff6ef'],
            [0.18, '#f1c9b0'],
            [0.45, '#c68468'],
            [0.72, '#7f4a3d'],
            [1.00, '#261713']
          ];
          break;
        case 'neon':
          stops = [
            [0.00, '#ffffff'],
            [0.12, '#72f3ff'],
            [0.36, '#3f7cff'],
            [0.62, '#d14cff'],
            [0.82, '#25164d'],
            [1.00, '#05040c']
          ];
          break;
        case 'iridescent':
        default:
          stops = [
            [0.00, '#ffffff'],
            [0.12, '#6de8ff'],
            [0.28, '#4e74ff'],
            [0.46, '#ff4fcf'],
            [0.64, '#ff8a65'],
            [0.82, '#5a52ff'],
            [1.00, '#090613']
          ];
          break;
      }

      const grad = ctx.createRadialGradient(size * 0.36, size * 0.30, 8, size * 0.5, size * 0.5, size * 0.62);
      for (const [pos, color] of stops) grad.addColorStop(pos, color);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    async function loadMatcapTexture() {
      if (config.matcapSource === 'url' && config.matcapUrl) {
        const loader = new THREE.TextureLoader();
        const texture = await loader.loadAsync(resolveUrl(config.matcapUrl));
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.needsUpdate = true;
        return texture;
      }
      return makeMatcapTexture(config.matcapPreset);
    }

    async function makeMaterial() {
      if (config.materialMode === 'normal') {
        return new THREE.MeshNormalMaterial();
      }

      if (config.materialMode === 'matcap') {
        const matcap = await loadMatcapTexture();
        return new THREE.MeshMatcapMaterial({ matcap });
      }

      return new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.9,
        metalness: 0.0
      });
    }

    async function collapseObjectToMesh(root) {
      const group = new THREE.Group();
      const baseMaterial = await makeMaterial();

      root.traverse((child) => {
        if (child.isMesh && child.geometry) {
          const geometry = child.geometry.clone();
          geometry.computeVertexNormals();

          const material = baseMaterial.clone();
          if (baseMaterial.matcap) {
            material.matcap = baseMaterial.matcap;
          }

          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.copy(child.position);
          mesh.rotation.copy(child.rotation);
          mesh.scale.copy(child.scale);
          group.add(mesh);
        }
      });

      return group;
    }

    function normalizeObject(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);
      root.position.sub(center);

      const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
      const scale = 2.4 / maxDim;
      root.scale.setScalar(scale);

      root.rotation.x = config.baseRotX;
      root.rotation.y = config.baseRotY;
      root.position.x += config.modelX;
      root.position.y += config.modelY;
      root.position.z += config.modelZ;

      return root;
    }

    async function loadObjText(url) {
      const response = await fetch(resolveUrl(url), { mode: 'cors' });
      if (!response.ok) {
        throw new Error(`Не удалось загрузить OBJ: ${response.status} ${response.statusText}`);
      }
      return await response.text();
    }

    async function main() {
      if (!displayCtx) throw new Error('2D canvas не создался.');

      setStatus('Загружаю OBJ…');
      const objText = await loadObjText(config.obj);

      setStatus('Собираю сцену…');
      const loader = new OBJLoader();
      const parsed = loader.parse(objText);
      const meshGroup = await collapseObjectToMesh(parsed);

      if (!meshGroup.children.length) {
        throw new Error('OBJ загружен, но в нём не найдено mesh-геометрии.');
      }

      const model = normalizeObject(meshGroup);

      const renderer = new THREE.WebGLRenderer({
        canvas: webglCanvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true
      });
      // Do NOT call setPixelRatio here — we manage the physical canvas size
      // ourselves so that bufferCanvas can read back at exactly the same
      // resolution without any dpr mismatch.
      renderer.setPixelRatio(1);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 6);

      const ambient = new THREE.AmbientLight(0xffffff, config.ambientIntensity);
      scene.add(ambient);

      const light = new THREE.DirectionalLight(0xffffff, config.lightIntensity);
      scene.add(light);
      scene.add(light.target);
      scene.add(model);

      const trailCanvas = document.createElement('canvas');
      const trailCtx = trailCanvas.getContext('2d', { willReadFrequently: true });
      const bufferCanvas = document.createElement('canvas');
      const bufferCtx = bufferCanvas.getContext('2d', { willReadFrequently: true });

      if (!trailCtx || !bufferCtx) {
        throw new Error('Вспомогательные canvas не создались.');
      }

      const mouse = new THREE.Vector2(0.5, 0.5);

      // CSS dimensions (what the browser lays out, what the glyph grid uses)
      let width = 1;
      let height = 1;

      let raf = 0;
      let grid = [];
      let cols = 0;
      let rows = 0;

      const state = {
        dragging: false,
        lastPointerX: 0,
        lastPointerY: 0,
        lastPointerDX: 0,
        lastPointerDY: 0,
        panX: config.modelX,
        panY: config.modelY,
        targetPanX: config.modelX,
        targetPanY: config.modelY,
        currentRotX: config.baseRotX,
        currentRotY: config.baseRotY,
        targetRotX: config.baseRotX,
        targetRotY: config.baseRotY
      };

      function updateLightPosition() {
        const angle = config.lightRotation;
        light.position.set(
          Math.cos(angle) * config.lightDistance,
          config.lightHeight,
          Math.sin(angle) * config.lightDistance
        );
        light.target.position.set(0, 0, 0);
        light.target.updateMatrixWorld();
      }

      function resize() {
        const rect = mount.getBoundingClientRect();
        // CSS / logical pixels — used for the glyph grid, mouse coords, display canvas
        width  = Math.max(320, Math.floor(rect.width));
        height = Math.max(320, Math.floor(rect.height));

        // Physical pixels — used for the WebGL renderer and the buffer canvas
        // that reads back the WebGL output.
        const physW = Math.round(width  * dpr);
        const physH = Math.round(height * dpr);

        // WebGL canvas: physical size, CSS size via style
        webglCanvas.width  = physW;
        webglCanvas.height = physH;
        webglCanvas.style.width  = width  + 'px';
        webglCanvas.style.height = height + 'px';
        renderer.setSize(physW, physH, false);

        camera.aspect = width / height;
        camera.updateProjectionMatrix();

        // Display / trail canvases: CSS pixels only (no dpr scaling needed here)
        displayCanvas.width  = width;
        displayCanvas.height = height;
        trailCanvas.width  = width;
        trailCanvas.height = height;

        // Buffer canvas reads back the WebGL canvas pixel-for-pixel,
        // so it must match the physical size.
        bufferCanvas.width  = physW;
        bufferCanvas.height = physH;

        rebuildGrid();
      }

      function rebuildGrid() {
        const cell = Math.max(4, config.cell);
        cols = Math.ceil(width / cell);
        rows = Math.ceil(height / cell);
        grid = new Array(cols * rows);

        for (let gy = 0; gy < rows; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const baseX = gx * cell;
            const baseY = gy * cell;
            grid[gy * cols + gx] = {
              baseX,
              baseY,
              x: baseX,
              y: baseY,
              vx: 0,
              vy: 0,
              glow: 0,
              active: false,
              brightness: 0
            };
          }
        }
      }

      function paintTrail() {
        trailCtx.clearRect(0, 0, width, height);
        if (!config.cursorGlow || config.trail <= 0) return;

        const x = mouse.x * width;
        const y = mouse.y * height;
        const grad = trailCtx.createRadialGradient(
          x, y, 0,
          x, y, Math.max(40, width * 0.12 * config.trail + 20)
        );
        grad.addColorStop(0, `rgba(255,255,255,${0.28 + config.trail * 0.45})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');

        trailCtx.fillStyle = grad;
        trailCtx.beginPath();
        trailCtx.arc(x, y, Math.max(30, width * 0.08 * config.trail + 18), 0, Math.PI * 2);
        trailCtx.fill();
      }

      function updateModelMask() {
        // Draw the WebGL canvas (physical pixels) into bufferCanvas (also physical pixels).
        // This is a straight 1-to-1 copy — no scaling needed.
        bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
        bufferCtx.drawImage(webglCanvas, 0, 0);
        const baseData = bufferCtx.getImageData(0, 0, bufferCanvas.width, bufferCanvas.height).data;

        const cell = Math.max(4, config.cell);

        for (let gy = 0; gy < rows; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const node = grid[gy * cols + gx];

            // Sample at the centre of the glyph cell.
            // The glyph grid works in CSS pixels; multiply by dpr to get
            // the correct physical pixel address inside baseData.
            const cssPx = Math.min(width  - 1, Math.max(0, Math.floor(node.baseX + cell * 0.5)));
            const cssPy = Math.min(height - 1, Math.max(0, Math.floor(node.baseY + cell * 0.5)));
            const physPx = Math.min(bufferCanvas.width  - 1, Math.round(cssPx * dpr));
            const physPy = Math.min(bufferCanvas.height - 1, Math.round(cssPy * dpr));

            const idx = (physPy * bufferCanvas.width + physPx) * 4;

            const r = baseData[idx];
            const g = baseData[idx + 1];
            const b = baseData[idx + 2];
            const a = baseData[idx + 3] / 255;

            const rawBrightness = ((0.2126 * r + 0.7152 * g + 0.0722 * b) / 255) * a;
            node.brightness = rawBrightness;
            node.active = rawBrightness > 0.03;
          }
        }

        return baseData;
      }

      // drawAscii needs to sample the same physical pixel buffer.
      // We keep a reference to the last baseData returned by updateModelMask.
      let lastBaseData = null;

      function updateGridPhysics() {
        if (!config.mouseTrail) {
          for (let i = 0; i < grid.length; i++) {
            const node = grid[i];
            node.vx += (node.baseX - node.x) * config.returnStrength;
            node.vy += (node.baseY - node.y) * config.returnStrength;
            node.vx *= 0.88;
            node.vy *= 0.88;
            node.x += node.vx;
            node.y += node.vy;
            node.glow *= 0.92;
          }
          return;
        }

        const mouseX = mouse.x * width;
        const mouseY = mouse.y * height;
        const radius = config.radius;
        const radiusSq = radius * radius;
        const pointerVX = state.lastPointerDX || 0;
        const pointerVY = state.lastPointerDY || 0;

        for (let i = 0; i < grid.length; i++) {
          const node = grid[i];

          if (!node.active) {
            node.vx += (node.baseX - node.x) * config.returnStrength;
            node.vy += (node.baseY - node.y) * config.returnStrength;
            node.vx *= 0.88;
            node.vy *= 0.88;
            node.x += node.vx;
            node.y += node.vy;
            node.glow *= 0.9;
            continue;
          }

          const dx = node.baseX - mouseX;
          const dy = node.baseY - mouseY;
          const distSq = dx * dx + dy * dy;

          if (distSq < radiusSq) {
            const dist = Math.sqrt(distSq) || 0.0001;
            const falloff = 1 - dist / radius;

            const nx = dx / dist;
            const ny = dy / dist;

            const repel = falloff * config.force * 0.55;
            node.vx += nx * repel;
            node.vy += ny * repel;

            const dragInfluence = falloff * 0.42;
            node.vx += pointerVX * dragInfluence;
            node.vy += pointerVY * dragInfluence;

            const tx = -ny;
            const ty = nx;
            node.vx += tx * falloff * config.swirl * 0.08;
            node.vy += ty * falloff * config.swirl * 0.08;

            node.glow = Math.min(1, node.glow + falloff * 0.08);
          }

          node.vx += (node.baseX - node.x) * config.returnStrength;
          node.vy += (node.baseY - node.y) * config.returnStrength;

          node.vx *= 0.88;
          node.vy *= 0.88;

          node.x += node.vx;
          node.y += node.vy;
          node.glow *= 0.92;
        }
      }

      function drawAscii() {
        const baseData = updateModelMask();
        lastBaseData = baseData;
        const trailData = trailCtx.getImageData(0, 0, width, height).data;

        displayCtx.clearRect(0, 0, width, height);
        if (!config.transparent) {
          displayCtx.fillStyle = config.bg;
          displayCtx.fillRect(0, 0, width, height);
        }

        const cell = Math.max(4, config.cell);
        const chars = config.charset || ' .:-=+*#%@';
        displayCtx.font = `${Math.floor(cell * 1.02)}px monospace`;
        displayCtx.textBaseline = 'top';

        const fallbackRgb = hexToRgb(config.color);

        for (let gy = 0; gy < rows; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const node = grid[gy * cols + gx];
            if (!node.active) continue;

            // Same dpr-aware sampling as in updateModelMask
            const cssPx = Math.min(width  - 1, Math.max(0, Math.floor(node.baseX + cell * 0.5)));
            const cssPy = Math.min(height - 1, Math.max(0, Math.floor(node.baseY + cell * 0.5)));
            const physPx = Math.min(bufferCanvas.width  - 1, Math.round(cssPx * dpr));
            const physPy = Math.min(bufferCanvas.height - 1, Math.round(cssPy * dpr));
            const idx = (physPy * bufferCanvas.width + physPx) * 4;

            // Trail data is still in CSS-pixel space (trailCanvas is CSS-sized)
            const trailIdx = (cssPy * width + cssPx) * 4;

            const r = baseData[idx];
            const g = baseData[idx + 1];
            const b = baseData[idx + 2];
            const a = baseData[idx + 3] / 255;
            const tr = config.cursorGlow ? trailData[trailIdx] / 255 : 0;

            let brightness = ((0.2126 * r + 0.7152 * g + 0.0722 * b) / 255) * a;
            brightness = Math.pow(Math.max(0, brightness), config.shadowPower);

            if (brightness < config.blackThreshold) {
              brightness = 0;
            }

            brightness = Math.min(
              1,
              Math.max(0, brightness + tr * config.trail * 0.35 + node.glow * 0.18)
            );

            const charIndex = Math.min(chars.length - 1, Math.floor(brightness * (chars.length - 1)));
            const char = chars[charIndex];
            if (char === ' ' || brightness <= 0.01) continue;

            const alpha = Math.min(1, 0.18 + brightness * 0.95 + node.glow * 0.35);

            if (config.colorizeGlyphs) {
              const sat = applySaturation(r, g, b, config.saturation);
              const mixedR = fallbackRgb.r + (sat.r - fallbackRgb.r) * config.colorStrength;
              const mixedG = fallbackRgb.g + (sat.g - fallbackRgb.g) * config.colorStrength;
              const mixedB = fallbackRgb.b + (sat.b - fallbackRgb.b) * config.colorStrength;
              displayCtx.fillStyle = rgbaString(mixedR, mixedG, mixedB, alpha);
            } else {
              displayCtx.fillStyle = colorWithAlpha(config.color, alpha);
            }

            displayCtx.fillText(char, node.x, node.y);
          }
        }
      }

      function updateInteractionTargets() {
        if (!config.mouseRotate || state.dragging) {
          state.targetRotX = config.baseRotX;
          state.targetRotY = config.baseRotY;
          return;
        }

        state.targetRotY = config.baseRotY + (mouse.x - 0.5) * config.rotateInfluenceX;
        state.targetRotX = config.baseRotX + (mouse.y - 0.5) * config.rotateInfluenceY;
      }

      function onPointerMove(event) {
        const rect = displayCanvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;

        mouse.set(Math.min(1, Math.max(0, x)), Math.min(1, Math.max(0, y)));

        const dx = event.clientX - state.lastPointerX;
        const dy = event.clientY - state.lastPointerY;

        state.lastPointerDX = dx * 0.12;
        state.lastPointerDY = dy * 0.12;

        if (state.dragging && config.dragPan) {
          state.targetPanX += (dx / Math.max(320, width)) * 4 * config.panStrength;
          state.targetPanY -= (dy / Math.max(320, height)) * 4 * config.panStrength;
        }

        state.lastPointerX = event.clientX;
        state.lastPointerY = event.clientY;
      }

      function onPointerDown(event) {
        if (!config.dragPan) return;
        state.dragging = true;
        state.lastPointerX = event.clientX;
        state.lastPointerY = event.clientY;
        mount.classList.add('dragging');
        displayCanvas.setPointerCapture?.(event.pointerId);
      }

      function onPointerUp(event) {
        state.dragging = false;
        mount.classList.remove('dragging');
        displayCanvas.releasePointerCapture?.(event.pointerId);
      }

      function onLeave() {
        mouse.set(0.5, 0.5);
        state.dragging = false;
        state.lastPointerDX = 0;
        state.lastPointerDY = 0;
        mount.classList.remove('dragging');
      }

      function tick() {
        updateInteractionTargets();

        if (config.autoRotate && !state.dragging) {
          state.targetRotY += config.rotateSpeed;
        }

        state.currentRotX += (state.targetRotX - state.currentRotX) * 0.08;
        state.currentRotY += (state.targetRotY - state.currentRotY) * 0.08;
        state.panX += (state.targetPanX - state.panX) * 0.14;
        state.panY += (state.targetPanY - state.panY) * 0.14;

        model.rotation.x = state.currentRotX;
        model.rotation.y = state.currentRotY;
        model.position.x = state.panX;
        model.position.y = state.panY;
        model.position.z = config.modelZ;

        updateLightPosition();
        renderer.setClearColor(0x000000, config.transparent ? 0 : 1);
        renderer.render(scene, camera);

        paintTrail();
        updateGridPhysics();
        drawAscii();

        raf = requestAnimationFrame(tick);
      }

      resize();
      updateLightPosition();

      displayCanvas.addEventListener('pointermove', onPointerMove);
      displayCanvas.addEventListener('pointerdown', onPointerDown);
      displayCanvas.addEventListener('pointerup', onPointerUp);
      displayCanvas.addEventListener('pointercancel', onPointerUp);
      displayCanvas.addEventListener('pointerleave', onLeave);
      window.addEventListener('resize', resize);

      tick();
      setStatus('Готово');

      window.addEventListener('beforeunload', () => {
        cancelAnimationFrame(raf);
        renderer.dispose();
      });
    }

    main().catch((error) => {
      console.error(error);
      showError(error instanceof Error ? error.message : String(error));
    });
  </script>
</body>
</html>
