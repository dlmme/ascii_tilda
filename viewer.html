<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ Glyph Dither Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, sans-serif;
    }
    #mount {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
      touch-action: none;
      cursor: auto;
    }
    #mount.dragging { cursor: auto; }
    #webgl, #display {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #webgl {
      opacity: 0 !important;
      pointer-events: none !important;
    }
    #overlay {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 4;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: min(92vw, 1200px);
      pointer-events: none;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 12, 18, 0.72);
      color: #d1d5db;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1;
    }
    .hidden { display: none !important; }
    #errorBox {
      position: fixed;
      inset: auto 16px 16px 16px;
      z-index: 5;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(26, 10, 12, 0.92);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.25);
      font-size: 13px;
      line-height: 1.45;
      max-width: min(900px, calc(100vw - 32px));
      backdrop-filter: blur(10px);
    }
  </style>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body>
  <div id="mount">
    <canvas id="webgl"></canvas>
    <canvas id="display"></canvas>
  </div>
  <div id="overlay">
    <div id="statusPill" class="pill">Загрузка…</div>
    <div id="metaPill"  class="pill">OBJ Glyph Dither</div>
  </div>
  <div id="errorBox" class="hidden"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

    const mount       = document.getElementById('mount');
    const webglCanvas = document.getElementById('webgl');
    const displayCanvas = document.getElementById('display');
    const displayCtx  = displayCanvas.getContext('2d', { willReadFrequently: true });
    const statusPill  = document.getElementById('statusPill');
    const metaPill    = document.getElementById('metaPill');
    const errorBox    = document.getElementById('errorBox');

    /* ── helpers ─────────────────────────────────────────────────────────── */
    const clampN = (v, lo, hi, fb) => { const n = Number(v); return Number.isFinite(n) ? Math.min(hi, Math.max(lo, n)) : fb; };
    const bool   = (v, fb) => v == null ? fb : (v === '1' || v === 'true' || v === 'yes');

    function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); statusPill.textContent = 'Ошибка'; }
    function setStatus(msg) { statusPill.textContent = msg; }

    function resolveUrl(p) { try { return new URL(p, location.href).toString(); } catch { return p; } }

    function hexToRgb(hex) {
      const c = (hex || '#fff').replace('#', '');
      const f = c.length === 3 ? c.split('').map(x => x+x).join('') : c.padEnd(6,'f').slice(0,6);
      return { r: parseInt(f.slice(0,2),16), g: parseInt(f.slice(2,4),16), b: parseInt(f.slice(4,6),16) };
    }
    const colorAlpha = (hex, a) => { const {r,g,b} = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; };
    const rgbaStr    = (r,g,b,a) => `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a})`;
    function satApply(r,g,b,s) {
      const L = 0.2126*r + 0.7152*g + 0.0722*b;
      return { r: L+(r-L)*s, g: L+(g-L)*s, b: L+(b-L)*s };
    }

    /* ── config ──────────────────────────────────────────────────────────── */
    const p = new URLSearchParams(location.search);
    const cfg = {
      obj: p.get('obj') || './model.obj',
      cell: clampN(p.get('cell'), 4, 40, 12),
      charset: p.get('charset') || ' .,:;i1tfLCG08@',
      color: p.get('color') || '#ffffff',
      bg:    p.get('bg')    || '#05070a',
      transparent: bool(p.get('transparent'), false),
      hud:         bool(p.get('hud'), true),
      force:        clampN(p.get('force'),         0,    5,    0.75),
      radius:       clampN(p.get('radius'),        20,   500,  140),
      returnStr:    clampN(p.get('return'),        0.01, 0.5,  0.18),
      swirl:        clampN(p.get('swirl'),         0,    3,    0.03),
      mouseTrail:   bool(p.get('mouseTrail'), true),
      cursorGlow:   bool(p.get('cursorGlow'), false),
      trail:        clampN(p.get('trail'),         0,    2,    0.04),
      decay:        clampN(p.get('decay'),         0.75, 0.995,0.92),
      autoRotate:   bool(p.get('autoRotate'), false),
      rotateSpeed:  clampN(p.get('rotateSpeed'),  -0.05,0.05, 0.004),
      mouseRotate:  bool(p.get('mouseRotate'), true),
      rotInflX:     clampN(p.get('rotateInfluenceX'),-4, 4,   1.1),
      rotInflY:     clampN(p.get('rotateInfluenceY'),-4, 4,   0.65),
      dragPan:      bool(p.get('dragPan'), false),
      panStrength:  clampN(p.get('panStrength'),  0.1,  5,    1.0),
      modelX:       clampN(p.get('modelX'),       -5,   5,    0),
      modelY:       clampN(p.get('modelY'),       -5,   5,    0),
      modelZ:       clampN(p.get('modelZ'),       -5,   5,    0),
      baseRotX:     clampN(p.get('baseRotX'),     -6.28,6.28,-0.25),
      baseRotY:     clampN(p.get('baseRotY'),     -6.28,6.28, 0.45),
      lightRot:     clampN(p.get('lightRotation'),-6.28,6.28, 0.70),
      lightH:       clampN(p.get('lightHeight'),  -10,  10,   4.0),
      lightDist:    clampN(p.get('lightDistance'), 0.2, 20,   5.0),
      lightInt:     clampN(p.get('lightIntensity'),0,   10,   2.2),
      ambientInt:   clampN(p.get('ambientIntensity'),0, 2,    0.12),
      shadowPow:    clampN(p.get('shadowPower'),   0.2, 4,    1.8),
      blackThr:     clampN(p.get('blackThreshold'),0,   1,    0.12),
      matMode:      p.get('materialMode')  || 'matcap',
      matPreset:    p.get('matcapPreset')  || 'iridescent',
      matSrc:       p.get('matcapSource')  || 'preset',
      matUrl:       p.get('matcapUrl')     || '',
      colorize:     bool(p.get('colorizeGlyphs'), true),
      colorStr:     clampN(p.get('colorStrength'), 0,  2,    1.0),
      saturation:   clampN(p.get('saturation'),    0,  2,    1.0),
    };

    if (!cfg.hud) document.getElementById('overlay').classList.add('hidden');
    metaPill.textContent = `${cfg.cell}px · ${cfg.matMode} · ${cfg.colorize ? 'color' : 'mono'}`;

    /* ── matcap ──────────────────────────────────────────────────────────── */
    function makeMatcap(preset) {
      const sz = 256, cv = document.createElement('canvas');
      cv.width = cv.height = sz;
      const cx = cv.getContext('2d');
      const palettes = {
        silver:      [[0,'#fff'],[.18,'#d9dce2'],[.38,'#8e939d'],[.62,'#f2f4f7'],[.82,'#767d87'],[1,'#14171c']],
        chrome:      [[0,'#fff'],[.12,'#e7ecf8'],[.26,'#6f7c96'],[.46,'#fefefe'],[.68,'#495872'],[.84,'#ced6e5'],[1,'#090b10']],
        clay:        [[0,'#fff6ef'],[.18,'#f1c9b0'],[.45,'#c68468'],[.72,'#7f4a3d'],[1,'#261713']],
        neon:        [[0,'#fff'],[.12,'#72f3ff'],[.36,'#3f7cff'],[.62,'#d14cff'],[.82,'#25164d'],[1,'#05040c']],
        iridescent:  [[0,'#fff'],[.12,'#6de8ff'],[.28,'#4e74ff'],[.46,'#ff4fcf'],[.64,'#ff8a65'],[.82,'#5a52ff'],[1,'#090613']],
      };
      const stops = palettes[preset] || palettes.iridescent;
      const g = cx.createRadialGradient(sz*.36,sz*.30,8, sz*.5,sz*.5,sz*.62);
      stops.forEach(([pos,col]) => g.addColorStop(pos, col));
      cx.fillStyle = g; cx.fillRect(0,0,sz,sz);
      const t = new THREE.CanvasTexture(cv);
      t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
      return t;
    }

    async function loadMatcap() {
      if (cfg.matSrc === 'url' && cfg.matUrl) {
        const t = await new THREE.TextureLoader().loadAsync(resolveUrl(cfg.matUrl));
        t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true; return t;
      }
      return makeMatcap(cfg.matPreset);
    }

    async function makeMaterial() {
      if (cfg.matMode === 'normal')   return new THREE.MeshNormalMaterial();
      if (cfg.matMode === 'matcap')   return new THREE.MeshMatcapMaterial({ matcap: await loadMatcap() });
      return new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.9, metalness:0 });
    }

    async function buildMeshGroup(root) {
      const grp = new THREE.Group();
      const base = await makeMaterial();
      root.traverse(child => {
        if (!child.isMesh || !child.geometry) return;
        const geo = child.geometry.clone(); geo.computeVertexNormals();
        const mat = base.clone(); if (base.matcap) mat.matcap = base.matcap;
        const m = new THREE.Mesh(geo, mat);
        m.position.copy(child.position); m.rotation.copy(child.rotation); m.scale.copy(child.scale);
        grp.add(m);
      });
      return grp;
    }

    function normalizeObject(root) {
      const box = new THREE.Box3().setFromObject(root);
      const sz = new THREE.Vector3(), ctr = new THREE.Vector3();
      box.getSize(sz); box.getCenter(ctr);
      root.position.sub(ctr);
      root.scale.setScalar(2.4 / Math.max(sz.x||1, sz.y||1, sz.z||1));
      root.rotation.x = cfg.baseRotX; root.rotation.y = cfg.baseRotY;
      root.position.x += cfg.modelX; root.position.y += cfg.modelY; root.position.z += cfg.modelZ;
      return root;
    }

    /* ── main ────────────────────────────────────────────────────────────── */
    async function main() {
      setStatus('Загружаю OBJ…');
      const res = await fetch(resolveUrl(cfg.obj), { mode:'cors' });
      if (!res.ok) throw new Error(`OBJ ${res.status} ${res.statusText}`);
      const objText = await res.text();

      setStatus('Собираю сцену…');
      const grp = await buildMeshGroup(new OBJLoader().parse(objText));
      if (!grp.children.length) throw new Error('Нет mesh в OBJ');
      const model = normalizeObject(grp);

      /* Three.js renderer — let it use its own dpr for quality */
      const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, antialias:true, alpha:true, preserveDrawingBuffer:true });
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 6);
      scene.add(new THREE.AmbientLight(0xffffff, cfg.ambientInt));
      const light = new THREE.DirectionalLight(0xffffff, cfg.lightInt);
      scene.add(light, light.target, model);

      /* Trail canvas stays in CSS pixels */
      const trailCv  = document.createElement('canvas');
      const trailCtx = trailCv.getContext('2d', { willReadFrequently:true });

      /* WebGL pixel readback buffer — matches PHYSICAL canvas pixels */
      let glBuf = null; // Uint8Array, allocated in resize()

      const mouse = new THREE.Vector2(0.5, 0.5);
let width = 1;
let height = 1;
let raf = 0;
let grid = [];
let cols = 0;
let rows = 0;

      const st = {
        dragging:false, lpx:0, lpy:0, ldx:0, ldy:0,
        panX:cfg.modelX, panY:cfg.modelY, tPanX:cfg.modelX, tPanY:cfg.modelY,
        rotX:cfg.baseRotX, rotY:cfg.baseRotY, tRotX:cfg.baseRotX, tRotY:cfg.baseRotY,
      };

      function updateLight() {
        light.position.set(Math.cos(cfg.lightRot)*cfg.lightDist, cfg.lightH, Math.sin(cfg.lightRot)*cfg.lightDist);
        light.target.position.set(0,0,0); light.target.updateMatrixWorld();
      }

      function resize() {
  const rect = mount.getBoundingClientRect();
  width = Math.max(320, Math.floor(rect.width));
  height = Math.max(320, Math.floor(rect.height));

  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  renderer.setPixelRatio(dpr);
  renderer.setSize(width, height, false);

  camera.aspect = width / height;
  camera.updateProjectionMatrix();

  webglCanvas.style.width = width + 'px';
  webglCanvas.style.height = height + 'px';
  displayCanvas.style.width = width + 'px';
  displayCanvas.style.height = height + 'px';

  trailCanvas.style.width = width + 'px';
  trailCanvas.style.height = height + 'px';
  bufferCanvas.style.width = width + 'px';
  bufferCanvas.style.height = height + 'px';

  webglCanvas.width = Math.floor(width * dpr);
  webglCanvas.height = Math.floor(height * dpr);
  displayCanvas.width = Math.floor(width * dpr);
  displayCanvas.height = Math.floor(height * dpr);
  trailCanvas.width = Math.floor(width * dpr);
  trailCanvas.height = Math.floor(height * dpr);
  bufferCanvas.width = Math.floor(width * dpr);
  bufferCanvas.height = Math.floor(height * dpr);

  displayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  trailCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  bufferCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  rebuildGrid();
}

      function rebuildGrid() {
        const cell = Math.max(4, cfg.cell);
        cols = Math.ceil(cssW / cell); rows = Math.ceil(cssH / cell);
        grid = Array.from({ length: cols * rows }, (_, i) => {
          const gx = i % cols, gy = Math.floor(i / cols);
          const bx = gx * cell, by = gy * cell;
          return { baseX:bx, baseY:by, x:bx, y:by, vx:0, vy:0, glow:0, active:false };
        });
      }

      function paintTrail() {
        trailCtx.clearRect(0, 0, cssW, cssH);
        if (!cfg.cursorGlow || cfg.trail <= 0) return;
        const x = mouse.x*cssW, y = mouse.y*cssH;
        const r = Math.max(40, cssW*0.12*cfg.trail+20);
        const g = trailCtx.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0, `rgba(255,255,255,${0.28+cfg.trail*0.45})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        trailCtx.fillStyle = g;
        trailCtx.beginPath(); trailCtx.arc(x, y, Math.max(30, cssW*0.08*cfg.trail+18), 0, Math.PI*2); trailCtx.fill();
      }

      /* Read WebGL pixels directly — no drawImage, no dpr confusion.
         readPixels reads from the physical framebuffer (physW × physH).
         We then map each glyph cell (CSS coords) → physical pixel via dpr scale. */
      function readGLPixels(gl) {
        gl.readPixels(0, 0, physW, physH, gl.RGBA, gl.UNSIGNED_BYTE, glBuf);
      }

      /* Convert CSS pixel (cx, cy) to index in glBuf.
         WebGL Y axis is flipped: row 0 is at the bottom. */
      function glIdx(cx, cy) {
        const px = Math.min(physW-1, Math.max(0, Math.round(cx * physW / cssW)));
        // flip Y: CSS y=0 is top, WebGL y=0 is bottom
        const py = Math.min(physH-1, Math.max(0, Math.round((1 - cy / cssH) * physH - 1)));
        return (py * physW + px) * 4;
      }

      function updateModelMask(gl) {
        readGLPixels(gl);
        const cell = Math.max(4, cfg.cell);
        for (let i = 0; i < grid.length; i++) {
          const nd = grid[i];
          const cx = Math.min(cssW-1, Math.max(0, Math.floor(nd.baseX + cell*0.5)));
          const cy = Math.min(cssH-1, Math.max(0, Math.floor(nd.baseY + cell*0.5)));
          const idx = glIdx(cx, cy);
          const r = glBuf[idx], g = glBuf[idx+1], b = glBuf[idx+2], a = glBuf[idx+3]/255;
          const bri = ((0.2126*r + 0.7152*g + 0.0722*b)/255) * a;
          nd.active = bri > 0.03;
        }
      }

      function updateGridPhysics() {
        const mouseX = mouse.x*cssW, mouseY = mouse.y*cssH;
        const r2 = cfg.radius*cfg.radius;
        for (let i = 0; i < grid.length; i++) {
          const nd = grid[i];
          if (!nd.active || !cfg.mouseTrail) {
            nd.vx += (nd.baseX-nd.x)*cfg.returnStr; nd.vy += (nd.baseY-nd.y)*cfg.returnStr;
            nd.vx *= 0.88; nd.vy *= 0.88; nd.x += nd.vx; nd.y += nd.vy;
            nd.glow *= (nd.active ? 0.92 : 0.9);
            continue;
          }
          const dx = nd.baseX-mouseX, dy = nd.baseY-mouseY;
          const dSq = dx*dx + dy*dy;
          if (dSq < r2) {
            const d = Math.sqrt(dSq)||0.0001, fo = 1-d/cfg.radius;
            const nx = dx/d, ny = dy/d;
            nd.vx += nx*fo*cfg.force*0.55 + st.ldx*fo*0.42 + (-ny)*fo*cfg.swirl*0.08;
            nd.vy += ny*fo*cfg.force*0.55 + st.ldy*fo*0.42 + nx*fo*cfg.swirl*0.08;
            nd.glow = Math.min(1, nd.glow+fo*0.08);
          }
          nd.vx += (nd.baseX-nd.x)*cfg.returnStr; nd.vy += (nd.baseY-nd.y)*cfg.returnStr;
          nd.vx *= 0.88; nd.vy *= 0.88; nd.x += nd.vx; nd.y += nd.vy; nd.glow *= 0.92;
        }
      }

      function drawAscii() {
        const trailData = cfg.cursorGlow ? trailCtx.getImageData(0,0,cssW,cssH).data : null;
        displayCtx.clearRect(0, 0, cssW, cssH);
        if (!cfg.transparent) { displayCtx.fillStyle = cfg.bg; displayCtx.fillRect(0,0,cssW,cssH); }

        const cell  = Math.max(4, cfg.cell);
        const chars = cfg.charset || ' .:-=+*#%@';
        displayCtx.font = `${Math.floor(cell*1.02)}px monospace`;
        displayCtx.textBaseline = 'top';
        const fb = hexToRgb(cfg.color);

        for (let i = 0; i < grid.length; i++) {
          const nd = grid[i];
          if (!nd.active) continue;

          const cx = Math.min(cssW-1, Math.max(0, Math.floor(nd.baseX+cell*0.5)));
          const cy = Math.min(cssH-1, Math.max(0, Math.floor(nd.baseY+cell*0.5)));
          const idx = glIdx(cx, cy);

          const r = glBuf[idx], g = glBuf[idx+1], b = glBuf[idx+2], a = glBuf[idx+3]/255;
          const tr = trailData ? trailData[(cy*cssW+cx)*4]/255 : 0;

          let bri = Math.pow(Math.max(0, ((0.2126*r+0.7152*g+0.0722*b)/255)*a), cfg.shadowPow);
          if (bri < cfg.blackThr) bri = 0;
          bri = Math.min(1, Math.max(0, bri + tr*cfg.trail*0.35 + nd.glow*0.18));

          const ch = chars[Math.min(chars.length-1, Math.floor(bri*(chars.length-1)))];
          if (ch === ' ' || bri <= 0.01) continue;

          const alpha = Math.min(1, 0.18 + bri*0.95 + nd.glow*0.35);
          if (cfg.colorize) {
            const s = satApply(r,g,b,cfg.saturation);
            displayCtx.fillStyle = rgbaStr(fb.r+(s.r-fb.r)*cfg.colorStr, fb.g+(s.g-fb.g)*cfg.colorStr, fb.b+(s.b-fb.b)*cfg.colorStr, alpha);
          } else {
            displayCtx.fillStyle = colorAlpha(cfg.color, alpha);
          }
          displayCtx.fillText(ch, nd.x, nd.y);
        }
      }

      function onPointerMove(e) {
        const rect = displayCanvas.getBoundingClientRect();
        mouse.set(
          Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width)),
          Math.min(1,Math.max(0,(e.clientY-rect.top)/rect.height))
        );
        const dx = e.clientX-st.lpx, dy = e.clientY-st.lpy;
        st.ldx = dx*0.12; st.ldy = dy*0.12;
        if (st.dragging && cfg.dragPan) {
          st.tPanX += (dx/Math.max(320,cssW))*4*cfg.panStrength;
          st.tPanY -= (dy/Math.max(320,cssH))*4*cfg.panStrength;
        }
        st.lpx = e.clientX; st.lpy = e.clientY;
      }
      function onPointerDown(e) { if(!cfg.dragPan)return; st.dragging=true; st.lpx=e.clientX; st.lpy=e.clientY; mount.classList.add('dragging'); displayCanvas.setPointerCapture?.(e.pointerId); }
      function onPointerUp(e)   { st.dragging=false; mount.classList.remove('dragging'); displayCanvas.releasePointerCapture?.(e.pointerId); }
      function onLeave()        { mouse.set(0.5,0.5); st.dragging=false; st.ldx=0; st.ldy=0; mount.classList.remove('dragging'); }

      const gl = webglCanvas.getContext('webgl2') || webglCanvas.getContext('webgl');

      function tick() {
        // rotation
        if (!cfg.mouseRotate || st.dragging) { st.tRotX=cfg.baseRotX; st.tRotY=cfg.baseRotY; }
        else { st.tRotY=cfg.baseRotY+(mouse.x-0.5)*cfg.rotInflX; st.tRotX=cfg.baseRotX+(mouse.y-0.5)*cfg.rotInflY; }
        if (cfg.autoRotate && !st.dragging) st.tRotY += cfg.rotateSpeed;

        st.rotX += (st.tRotX-st.rotX)*0.08; st.rotY += (st.tRotY-st.rotY)*0.08;
        st.panX += (st.tPanX-st.panX)*0.14; st.panY += (st.tPanY-st.panY)*0.14;

        model.rotation.x = st.rotX; model.rotation.y = st.rotY;
        model.position.x = st.panX; model.position.y = st.panY; model.position.z = cfg.modelZ;

        updateLight();
        renderer.setClearColor(0x000000, cfg.transparent ? 0 : 1);
        renderer.render(scene, camera);

        // Read pixels AFTER render, from the live WebGL context
        // (no intermediate canvas needed — correct for any dpr)
        updateModelMask(gl);

        paintTrail();
        updateGridPhysics();
        drawAscii();

        raf = requestAnimationFrame(tick);
      }

      resize();
      updateLight();

      displayCanvas.addEventListener('pointermove',  onPointerMove);
      displayCanvas.addEventListener('pointerdown',  onPointerDown);
      displayCanvas.addEventListener('pointerup',    onPointerUp);
      displayCanvas.addEventListener('pointercancel',onPointerUp);
      displayCanvas.addEventListener('pointerleave', onLeave);
      window.addEventListener('resize', resize);

      tick();
      setStatus('Готово');
      window.addEventListener('beforeunload', () => { cancelAnimationFrame(raf); renderer.dispose(); });
    }

    main().catch(e => { console.error(e); showError(e instanceof Error ? e.message : String(e)); });
  </script>
</body>
</html>
